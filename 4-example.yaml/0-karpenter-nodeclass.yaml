apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass

metadata:
  name: default

spec:
  amiFamily: AL2

  role: KarpenterNodeRole

  amiSelectorTerms:
    - alias: al2@latest

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: staging-demo

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: staging-demo